<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IdeaCatalyst — Premium AI Idea Workspace</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/images/favicon_logo_1784661221872.jpg" />
    <script>
      // Intercept and suppress benign WebSocket connection / close errors that occur
      // when Vite's HMR client is disabled or blocked in the sandboxed dev environment.
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' ||
          (typeof event.reason === 'string' && event.reason.includes('WebSocket')) ||
          (event.reason.message && event.reason.message.includes('WebSocket'))
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('WebSocket') ||
          event.message.includes('vite') ||
          event.message.includes('failed to connect to websocket')
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #FAFAFA;
      }
      /* Custom fine scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.08);
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.16);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
